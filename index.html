<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Printly - Mobile App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.427.0/dist/umd/lucide.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#473BF0;--p-h:#3730d4;--p-l:#EEF0FF;
  --ok:#10b981;--ok-bg:#ecfdf5;
  --warn:#f59e0b;--warn-bg:#fffbeb;
  --danger:#dc2626;--danger-bg:#fef2f2;
  --dark:#161C2D;--body:#3D4555;--muted:#9CA3AF;--placeholder:#d1d5db;
  --bg:#f9fafb;--bg-s:#f3f4f6;--white:#fff;
  --border:#E5E7EB;--border-l:#F3F4F6;
  --r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;--r99:999px;
  --sh-xs:0 1px 2px rgba(0,0,0,.04);
  --sh-s:0 2px 8px rgba(0,0,0,.06);
  --sh-m:0 4px 16px rgba(0,0,0,.08);
  --font:'Poppins',system-ui,-apple-system,sans-serif;
}
html{font-family:var(--font);font-size:14px;line-height:1.6;color:var(--body);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:30px 20px 40px;background:linear-gradient(160deg,#e8ecf1 0%,#dde3ea 40%,#d0d8e3 100%)}

/* ---- Layout ---- */
.phones-wrapper{display:flex;gap:56px;align-items:flex-start;justify-content:center;flex-wrap:wrap}
.phone-col{display:flex;flex-direction:column;align-items:center;gap:18px}
.phone-badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#64748b;background:rgba(255,255,255,.65);padding:7px 18px;border-radius:var(--r99);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.5);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.phone-badge .badge-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center}
.phone-badge .badge-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ---- Phone shared ---- */
.phone{width:393px;min-height:852px;max-height:852px;background:var(--white);overflow:hidden;position:relative;display:flex;flex-direction:column}

/* ---- iOS - iPhone 16 Pro ---- */
.phone.ios{border-radius:52px;box-shadow:0 0 0 1.5px #1a1a1a,0 0 0 4px #2d2d2d,0 0 0 6px rgba(120,120,130,.25),0 30px 80px rgba(0,0,0,.28)}
.ios-top{flex-shrink:0;background:var(--white);position:relative;z-index:10}
.ios-di-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px 0}
.ios-di-time{font-size:15px;font-weight:700;color:var(--dark);letter-spacing:-.01em}
.ios-di-center{display:flex;justify-content:center;margin:-8px 0 0}
.ios-dynamic-island{width:126px;height:36px;background:#000;border-radius:22px;position:relative;margin:0 auto}
.ios-dynamic-island::before{content:'';width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#2a2a3a,#0a0a14);position:absolute;left:26px;top:50%;transform:translateY(-50%)}
.ios-di-icons{display:flex;gap:5px;align-items:center}
.ios-di-icons svg{display:block}
.ios-status-gap{height:6px}
.ios-home-bar{flex-shrink:0;display:flex;justify-content:center;padding:6px 0 8px}
.ios-home-bar::after{content:'';width:134px;height:5px;background:var(--dark);border-radius:3px;opacity:.18}

/* ---- Android - Galaxy S25 Ultra ---- */
.phone.android{border-radius:30px;box-shadow:0 0 0 1.5px #1a1a1a,0 0 0 3px #333,0 0 0 5px rgba(80,80,80,.2),0 30px 80px rgba(0,0,0,.28)}
.and-top{flex-shrink:0;background:var(--white);position:relative;z-index:10;padding-top:6px}
.and-camera{width:12px;height:12px;background:radial-gradient(circle at 40% 40%,#2a2a3a,#0a0a0a);border-radius:50%;position:absolute;top:11px;left:50%;transform:translateX(-50%);z-index:20;box-shadow:0 0 0 2px #1a1a1a}
.and-status{display:flex;align-items:center;justify-content:space-between;padding:8px 24px 4px;font-size:12px;font-weight:500;color:var(--dark)}
.and-status-icons{display:flex;gap:4px;align-items:center}
.and-status-icons svg{display:block}
.and-gesture{flex-shrink:0;display:flex;justify-content:center;padding:4px 0 8px}
.and-gesture::after{content:'';width:134px;height:4px;background:var(--dark);border-radius:2px;opacity:.2}

/* Android tab bar - Material You style */
.phone.android .tab-bar{border-top:none;box-shadow:0 -1px 4px rgba(0,0,0,.04)}
.phone.android .tab.on{position:relative}
.phone.android .tab.on::before{content:'';position:absolute;top:2px;width:48px;height:28px;background:var(--p-l);border-radius:var(--r99);z-index:-1}

/* ---- Mobile Bottom Sheet ---- */
.m-sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:flex-end;overflow:hidden}
.phone.ios .m-sheet-overlay{border-radius:52px}
.phone.android .m-sheet-overlay{border-radius:30px}
.m-sheet-overlay.open{display:flex}
.m-sheet{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-height:80%;overflow:hidden;display:flex;flex-direction:column;animation:sheetUp .25s ease}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;cursor:pointer}
.m-sheet-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px}
.m-sheet-title{font-size:16px;font-weight:800;color:var(--dark)}
.m-sheet-body{padding:0 20px 20px;overflow-y:auto;flex:1}

/* ---- Scrollable content ---- */
.phone-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.phone-content::-webkit-scrollbar{display:none}

/* ---- Bottom tab bar ---- */
.tab-bar{display:flex;align-items:center;justify-content:space-around;height:64px;background:var(--white);border-top:1px solid var(--border-l);flex-shrink:0}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:500;color:var(--muted);cursor:pointer;padding:4px 12px;transition:.15s;-webkit-tap-highlight-color:transparent;position:relative}
.tab svg,.tab i{width:22px;height:22px}
.tab.on{color:var(--p);font-weight:700}
.tab.on svg,.tab.on i{stroke-width:2.4}
.tab:active{transform:scale(.92)}

/* ---- Mobile screens ---- */
.m-screen{display:none;min-height:100%}
.m-screen.on{display:flex;flex-direction:column}

/* ---- Header ---- */
.m-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.m-header-title{font-size:22px;font-weight:900;color:var(--dark);letter-spacing:-.02em}
.m-header-actions{display:flex;gap:8px}
.m-header-actions button{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.m-header-actions button svg{width:18px;height:18px;color:var(--body)}
.m-header-actions .notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid #fff}
.m-back{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;margin-right:12px;flex-shrink:0}
.m-back svg{width:18px;height:18px;color:var(--dark)}

/* ---- Search ---- */
.m-search{margin:0 20px 16px;position:relative}
.m-search input{width:100%;height:42px;padding:0 42px 0 40px;border:1px solid var(--border);border-radius:var(--r99);font-size:13px;font-family:var(--font);background:var(--bg-s);transition:.2s}
.m-search input:focus{outline:none;border-color:var(--p);background:var(--white);box-shadow:0 0 0 3px var(--p-l)}
.m-search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}

/* ---- Categories ---- */
.m-cats{display:flex;gap:12px;padding:0 20px;overflow-x:auto;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.m-cats::-webkit-scrollbar{display:none}
.m-cat{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:64px;cursor:pointer}
.m-cat-icon{width:52px;height:52px;border-radius:var(--r16);display:flex;align-items:center;justify-content:center;background:var(--p-l);transition:.15s}
.m-cat-icon svg{width:22px;height:22px;color:var(--p)}
.m-cat.on .m-cat-icon{background:var(--p)}
.m-cat.on .m-cat-icon svg{color:#fff}
.m-cat-label{font-size:10px;font-weight:600;color:var(--body);text-align:center;white-space:nowrap}

/* ---- Section / horizontal scroll ---- */
.m-section{padding:0 20px;margin-bottom:20px}
.m-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.m-section-title{font-size:16px;font-weight:800;color:var(--dark)}
.m-section-link{font-size:12px;font-weight:600;color:var(--p);cursor:pointer}
.m-hscroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.m-hscroll::-webkit-scrollbar{display:none}

/* ---- Product cards ---- */
.m-prod{width:160px;flex-shrink:0;background:var(--white);border:1px solid var(--border-l);border-radius:var(--r12);overflow:hidden;cursor:pointer;transition:.15s}
.m-prod:active{transform:scale(.97)}
.m-prod-img{width:100%;height:120px;object-fit:cover;background:var(--bg-s)}
.m-prod-body{padding:10px}
.m-prod-name{font-size:12px;font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.m-prod-vendor{font-size:10px;color:var(--muted);margin-bottom:6px}
.m-prod-foot{display:flex;align-items:center;justify-content:space-between}
.m-prod-price{font-size:13px;font-weight:800;color:var(--p)}
.m-prod-rating{font-size:10px;color:var(--warn);font-weight:700}

/* ---- Promo banner ---- */
.m-promo{margin:0 20px 16px;border-radius:var(--r16);padding:20px;background:linear-gradient(135deg,var(--p),#6366f1);color:#fff;position:relative;overflow:hidden}
.m-promo::after{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;background:rgba(255,255,255,.1);border-radius:50%}
.m-promo h3{font-size:16px;font-weight:800;margin-bottom:4px}
.m-promo p{font-size:12px;opacity:.85;margin-bottom:12px}
.m-promo button{background:#fff;color:var(--p);border:none;font-size:12px;font-weight:700;padding:8px 16px;border-radius:var(--r99);cursor:pointer;font-family:var(--font)}

/* ---- Product detail ---- */
.m-pdp-img{width:100%;height:280px;object-fit:cover;background:var(--bg-s)}
.m-pdp-body{padding:20px}
.m-pdp-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:var(--r99);background:var(--p-l);color:var(--p);margin-bottom:8px}
.m-pdp-title{font-size:18px;font-weight:900;color:var(--dark);margin-bottom:4px}
.m-pdp-vendor{font-size:12px;color:var(--muted);margin-bottom:10px}
.m-pdp-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.m-pdp-price{font-size:22px;font-weight:900;color:var(--p)}
.m-pdp-rating{font-size:12px;color:var(--warn);font-weight:700}
.m-pdp-reviews{font-size:11px;color:var(--muted)}
.m-pdp-options{margin-bottom:16px}
.m-pdp-options-label{font-size:12px;font-weight:700;color:var(--dark);margin-bottom:8px}
.m-opt-chips{display:flex;gap:6px;flex-wrap:wrap}
.m-opt-chip{padding:6px 14px;border:1px solid var(--border);border-radius:var(--r99);font-size:11px;font-weight:600;color:var(--body);cursor:pointer;transition:.15s;background:var(--white)}
.m-opt-chip.on{border-color:var(--p);background:var(--p-l);color:var(--p)}
.m-opt-chip:active{transform:scale(.96)}
.m-pdp-desc{font-size:13px;color:var(--body);line-height:1.7;margin-bottom:16px}
.m-pdp-add{position:sticky;bottom:0;padding:16px 20px;background:var(--white);border-top:1px solid var(--border-l);display:flex;gap:10px}
.m-pdp-add .btn-cart{flex:1;height:48px;background:var(--p);color:#fff;border:none;border-radius:var(--r12);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px}
.m-pdp-add .btn-cart:active{background:var(--p-h)}
.m-pdp-add .btn-fav{width:48px;height:48px;border:1px solid var(--border);border-radius:var(--r12);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer}
.m-pdp-add .btn-fav svg{width:20px;height:20px;color:var(--muted)}
.m-pdp-add .btn-fav.liked{border-color:var(--danger);background:var(--danger-bg)}
.m-pdp-add .btn-fav.liked svg{color:var(--danger);fill:var(--danger)}

/* ---- Cart ---- */
.m-cart-item{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border-l);transition:opacity .3s,transform .3s}
.m-cart-item img{width:64px;height:64px;border-radius:var(--r10);object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
.m-cart-info{flex:1;min-width:0}
.m-cart-name{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px}
.m-cart-spec{font-size:11px;color:var(--muted);margin-bottom:6px}
.m-cart-bottom{display:flex;align-items:center;justify-content:space-between}
.m-cart-price{font-size:14px;font-weight:800;color:var(--p)}
.m-qty{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:var(--r8);overflow:hidden}
.m-qty button{width:30px;height:28px;border:none;background:var(--bg-s);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dark)}
.m-qty span{width:30px;text-align:center;font-size:13px;font-weight:700;color:var(--dark)}
.m-cart-summary{padding:16px 20px;border-top:1px solid var(--border-l)}
.m-cart-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px}
.m-cart-row.total{font-size:16px;font-weight:800;color:var(--dark);border-top:1px solid var(--border-l);padding-top:10px;margin-top:4px}
.m-checkout-btn{margin:0 20px 20px;height:50px;background:var(--p);color:#fff;border:none;border-radius:var(--r12);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);width:calc(100% - 40px);display:flex;align-items:center;justify-content:center;gap:8px}
.m-checkout-btn:active{background:var(--p-h)}

/* ---- Orders ---- */
.m-order{margin:0 20px;padding:16px;border:1px solid var(--border-l);border-radius:var(--r12);margin-bottom:10px;cursor:pointer;transition:.15s}
.m-order:active{border-color:var(--p);background:var(--p-l)}
.m-order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.m-order-id{font-size:13px;font-weight:800;color:var(--dark)}
.m-order-items{font-size:12px;color:var(--body);margin-bottom:8px}
.m-order-bottom{display:flex;justify-content:space-between;align-items:center}
.m-order-price{font-size:14px;font-weight:800;color:var(--dark)}
.m-order-date{font-size:11px;color:var(--muted)}
.m-order-tab{padding:6px 14px;border-radius:var(--r99);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid var(--border);color:var(--body);transition:all .2s}
.m-order-tab.on{background:var(--p);color:#fff;border-color:var(--p)}

/* ---- Profile ---- */
.m-profile-header{padding:20px;text-align:center;background:linear-gradient(135deg,var(--p),#6366f1);color:#fff;margin-bottom:16px}
.m-profile-avatar{width:72px;height:72px;border-radius:50%;border:3px solid #fff;object-fit:cover;margin-bottom:10px}
.m-profile-name{font-size:18px;font-weight:800}
.m-profile-email{font-size:12px;opacity:.8}
.m-profile-points{margin-top:8px;display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);padding:4px 12px;border-radius:var(--r99);font-size:11px;font-weight:700}
.m-menu-item{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;transition:.1s}
.m-menu-item:active{background:var(--bg-s)}
.m-menu-item svg{width:20px;height:20px;color:var(--muted);flex-shrink:0}
.m-menu-label{flex:1;font-size:14px;font-weight:500;color:var(--dark)}
.m-menu-arrow{width:16px;height:16px;color:var(--placeholder)}
.m-menu-divider{height:1px;background:var(--border-l);margin:4px 20px}

/* ---- Badges ---- */
.m-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--r99)}
.m-badge-p{background:var(--p-l);color:var(--p)}
.m-badge-ok{background:var(--ok-bg);color:var(--ok)}
.m-badge-warn{background:var(--warn-bg);color:var(--warn)}
.m-badge-danger{background:var(--danger-bg);color:var(--danger)}

/* ---- Toast ---- */
.m-toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:10px 24px;border-radius:var(--r99);font-size:13px;font-weight:600;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.m-toast.show{opacity:1}

/* ---- Vendor card ---- */
.vendor-card{min-width:140px;padding:14px;border:1px solid var(--border-l);border-radius:var(--r12);text-align:center;flex-shrink:0;cursor:pointer;transition:.15s}
.vendor-card:active{border-color:var(--p);background:var(--p-l)}
.vendor-card img{width:44px;height:44px;border-radius:50%;object-fit:cover;margin-bottom:8px;border:2px solid var(--p-l)}
.vendor-card .v-name{font-size:12px;font-weight:700;color:var(--dark)}
.vendor-card .v-rate{font-size:10px;color:var(--warn);font-weight:700;margin-top:2px}

/* ---- Portal links ---- */
.portal-links{display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap}
.portal-links a{font-size:12px;font-weight:600;color:var(--p);padding:6px 14px;border:1px solid var(--p);border-radius:var(--r99);transition:.15s;background:rgba(255,255,255,.5);backdrop-filter:blur(8px)}
.portal-links a:hover{background:var(--p);color:#fff}

/* ---- Responsive ---- */
@media(max-width:900px){
  .phones-wrapper{gap:32px}
  .phone{width:360px;min-height:780px;max-height:780px}
  .phone.ios{border-radius:46px}
  .phone.ios .m-sheet-overlay{border-radius:46px}
}
</style>
</head>
<body>

<div class="m-toast" id="mToast"></div>

<div class="phones-wrapper">
  <!-- ============ iOS - iPhone 16 Pro ============ -->
  <div class="phone-col">
    <div class="phone ios" id="phone-ios" data-phone="ios">
      <div class="ios-top">
        <div class="ios-di-bar">
          <span class="ios-di-time">9:41</span>
          <span class="ios-di-icons">
            <svg viewBox="0 0 18 12" width="17" height="11"><rect x="0" y="8" width="3" height="4" rx=".7" fill="currentColor"/><rect x="4.5" y="5.5" width="3" height="6.5" rx=".7" fill="currentColor"/><rect x="9" y="3" width="3" height="9" rx=".7" fill="currentColor"/><rect x="13.5" y="0" width="3" height="12" rx=".7" fill="currentColor"/></svg>
            <svg viewBox="0 0 16 12" width="15" height="11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 4.5a12 12 0 0 1 14 0"/><path d="M3.5 7.2a8 8 0 0 1 9 0"/><path d="M6 9.8a4 4 0 0 1 4 0"/><circle cx="8" cy="12" r=".5" fill="currentColor" stroke="none"/></svg>
            <svg viewBox="0 0 28 13" width="26" height="12"><rect x=".5" y=".5" width="22" height="11.5" rx="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="2.5" y="2.5" width="16" height="7.5" rx="1.2" fill="currentColor"/><path d="M24 4.5v4a2 2 0 0 0 0-4z" fill="currentColor" opacity=".4"/></svg>
          </span>
        </div>
        <div class="ios-di-center"><div class="ios-dynamic-island"></div></div>
        <div class="ios-status-gap"></div>
      </div>
      <div class="phone-content" id="ios-content"></div>
      <div class="m-sheet-overlay" id="ios-overlay" onclick="closeSheet('ios')">
        <div class="m-sheet" onclick="event.stopPropagation()">
          <div class="m-sheet-handle" onclick="closeSheet('ios')"></div>
          <div class="m-sheet-header">
            <div class="m-sheet-title" id="ios-sheet-title">Title</div>
            <button class="m-back" onclick="closeSheet('ios')" style="margin-right:0"><i data-lucide="x"></i></button>
          </div>
          <div class="m-sheet-body" id="ios-sheet-body"></div>
        </div>
      </div>
      <div class="tab-bar" id="ios-tabs">
        <div class="tab on" onclick="sw('ios','home')"><i data-lucide="home"></i>Home</div>
        <div class="tab" onclick="sw('ios','search')"><i data-lucide="search"></i>Browse</div>

<script>
/* ======================================================
   Printly Mobile - Dual Phone Controller
   ====================================================== */

// ---- Shared product data ----
var allProducts = [];
var phoneState = {
  ios: { prev: 'home', pdpIdx: -1 },
  and: { prev: 'home', pdpIdx: -1 }
};

// ---- Helpers ----
function q(p, id) { return document.getElementById(p + '-' + id); }
function qa(p, sel) { return document.getElementById('phone-' + p).querySelectorAll(sel); }

function mToast(msg) {
  var el = document.getElementById('mToast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 1800);
}

// ---- Screen switching ----
function sw(p, screen) {
  var cur = document.querySelector('#phone-' + p + ' .m-screen.on');
  if (cur) { phoneState[p].prev = cur.dataset.screen; cur.classList.remove('on'); }
  var next = q(p, 'ms-' + screen);
  if (next) next.classList.add('on');
  q(p, 'content').scrollTop = 0;
  // Update tabs
  document.querySelectorAll('#' + p + '-tabs .tab').forEach(function(t){ t.classList.remove('on'); });
  var tabMap = { home:0, search:1, cart:2, orders:3, profile:4, pdp:-1 };
  var idx = tabMap[screen];
  if (idx >= 0) { var tabs = document.querySelectorAll('#' + p + '-tabs .tab'); if(tabs[idx]) tabs[idx].classList.add('on'); }
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function goBack(p) { sw(p, phoneState[p].prev || 'home'); }

// ---- Product detail ----
function openPdp(p, idx) {
  var prod = allProducts[idx];
  if (!prod) return;
  phoneState[p].pdpIdx = idx;
  q(p,'pdp-img').src = prod.thumb;
  q(p,'pdp-badge').textContent = prod.badge || prod.category;
  q(p,'pdp-title').textContent = prod.name;
  q(p,'pdp-vendor').textContent = prod.vendorName;
  q(p,'pdp-price').textContent = 'KWD ' + prod.price.toFixed(3);
  q(p,'pdp-rating').innerHTML = '\u2605 ' + prod.rating;
  q(p,'pdp-reviews').textContent = '(' + prod.reviewCount + ' reviews)';
  q(p,'pdp-desc').textContent = prod.description || 'High-quality printing with premium materials and fast turnaround.';
  // Options
  var optHtml = '';
  if (prod.options) {
    for (var key in prod.options) {
      var values = prod.options[key];
      optHtml += '<div class="m-pdp-options"><div class="m-pdp-options-label">' + key + '</div><div class="m-opt-chips">';
      values.forEach(function(v, i) {
        optHtml += '<div class="m-opt-chip' + (i===0?' on':'') + '" onclick="this.parentElement.querySelectorAll(\'.m-opt-chip\').forEach(function(c){c.classList.remove(\'on\')});this.classList.add(\'on\')">' + v + '</div>';
      });
      optHtml += '</div></div>';
    }
  }
  q(p,'pdp-options').innerHTML = optHtml;
  sw(p, 'pdp');
}

function toggleFav(p) {
  var btn = q(p, 'pdp-fav');
  btn.classList.toggle('liked');
  mToast(btn.classList.contains('liked') ? 'Added to wishlist' : 'Removed from wishlist');
}

// ---- Add to cart ----
function addToCart(p) {
  var prod = allProducts[phoneState[p].pdpIdx];
  if (!prod) { mToast('Added to cart!'); return; }
  var cartList = q(p, 'cart-items');
  var existing = cartList.querySelector('.m-cart-item[data-name="' + prod.name + '"]');
  if (existing) {
    var qs = existing.querySelector('.m-qty span');
    var qty = parseInt(qs.textContent) + 1;
    qs.textContent = qty;
    var unit = parseFloat(existing.dataset.unit);
    existing.querySelector('.m-cart-price').textContent = 'KWD ' + (unit * qty).toFixed(3);
  } else {
    var item = document.createElement('div');
    item.className = 'm-cart-item';
    item.dataset.unit = prod.price.toFixed(3);
    item.dataset.name = prod.name;
    item.innerHTML = '<img src="' + prod.thumb + '" alt=""/><div class="m-cart-info"><div class="m-cart-name">' + prod.name + '</div><div class="m-cart-spec">' + (prod.category||'') + '</div><div class="m-cart-bottom"><div class="m-cart-price">KWD ' + prod.price.toFixed(3) + '</div><div class="m-qty"><button onclick="updateQty(\'' + p + '\',this,-1)">\u2212</button><span>1</span><button onclick="updateQty(\'' + p + '\',this,1)">+</button></div></div></div>';
    cartList.appendChild(item);
  }
  recalcCart(p);
  mToast(prod.name + ' added to cart!');
}

// ---- Cart quantity ----
function updateQty(p, btn, delta) {
  var item = btn.closest('.m-cart-item');
  var qs = item.querySelector('.m-qty span');
  var qty = parseInt(qs.textContent) + delta;
  if (qty < 1) {
    item.style.opacity = '0'; item.style.transform = 'translateX(-100%)';
    setTimeout(function(){ item.remove(); recalcCart(p); }, 300);
    return;
  }
  qs.textContent = qty;
  var unit = parseFloat(item.dataset.unit);
  item.querySelector('.m-cart-price').textContent = 'KWD ' + (unit * qty).toFixed(3);
  recalcCart(p);
}

function recalcCart(p) {
  var items = q(p,'cart-items').querySelectorAll('.m-cart-item');
  var subtotal = 0, count = 0;
  items.forEach(function(item) {
    var qty = parseInt(item.querySelector('.m-qty span').textContent);
    subtotal += parseFloat(item.dataset.unit) * qty;
    count += qty;
  });
  q(p,'cart-count').textContent = count + ' item' + (count !== 1 ? 's' : '');
  var delivery = count > 0 ? 2.0 : 0;
  var discount = count > 0 ? 5.0 : 0;
  var total = Math.max(0, subtotal + delivery - discount);
  var rows = document.querySelectorAll('#phone-' + p + ' .m-cart-row');
  if(rows[0]) rows[0].querySelector('span:last-child').textContent = 'KWD ' + subtotal.toFixed(3);
  if(rows[1]) rows[1].querySelector('span:last-child').textContent = 'KWD ' + delivery.toFixed(3);
  if(rows[2]) rows[2].querySelector('span:last-child').textContent = '\u2212KWD ' + discount.toFixed(3);
  if(rows[3]) rows[3].querySelector('span:last-child').textContent = 'KWD ' + total.toFixed(3);
  var btn = document.querySelector('#phone-' + p + ' .m-checkout-btn');
  if (btn) {
    if (count === 0) { btn.textContent = 'Cart is empty'; btn.disabled = true; btn.style.opacity = '.5'; }
    else { btn.innerHTML = '<i data-lucide="lock" style="width:16px;height:16px"></i>Checkout \u00b7 KWD ' + total.toFixed(3); btn.disabled = false; btn.style.opacity = '1'; btn.onclick = function(){ showSheet(p,'Checkout','checkout'); }; if(typeof lucide!=='undefined') lucide.createIcons(); }
  }
}

// ---- Search filter ----
function filterSearch(p, query) {
  var grid = q(p, 'search-results');
  if (!grid) return;
  var qry = query.toLowerCase().trim();
  if (!qry) { grid.innerHTML = allProducts.map(function(prod,i){ return renderGridCard(p,prod,i); }).join(''); if(typeof lucide!=='undefined') lucide.createIcons(); return; }
  var filtered = allProducts.map(function(prod,i){ return {p:prod,i:i}; }).filter(function(item){
    return item.p.name.toLowerCase().indexOf(qry)!==-1 || item.p.vendorName.toLowerCase().indexOf(qry)!==-1 || (item.p.category && item.p.category.toLowerCase().indexOf(qry)!==-1);
  });
  if (!filtered.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px 20px"><i data-lucide="search-x" style="width:40px;height:40px;color:var(--muted);display:block;margin:0 auto 12px"></i><div style="font-size:14px;font-weight:700;color:var(--dark);margin-bottom:4px">No results found</div><div style="font-size:12px;color:var(--muted)">Try a different search term</div></div>';
  } else { grid.innerHTML = filtered.map(function(item){ return renderGridCard(p,item.p,item.i); }).join(''); }
  if(typeof lucide!=='undefined') lucide.createIcons();
}

// ---- Order tab filter ----
function filterOrders(p, tab, el) {
  document.querySelectorAll('#phone-' + p + ' .m-order-tab').forEach(function(t){ t.classList.remove('on'); });
  el.classList.add('on');
  var statusMap = { Active:['Confirmed','Printing'], Delivered:['Delivered'], Cancelled:['Cancelled'] };
  document.querySelectorAll('#phone-' + p + ' .m-order').forEach(function(order) {
    var badge = order.querySelector('.m-badge');
    if (!badge) return;
    var status = badge.textContent.trim();
    order.style.display = (tab === 'All' || (statusMap[tab]||[]).indexOf(status) !== -1) ? '' : 'none';
  });
}

// ---- Category filter ----
function filterCat(p, label) {
  sw(p, 'search');
  // Sync browse cats
  document.querySelectorAll('#phone-' + p + ' #' + p + '-ms-search .m-cat').forEach(function(c){
    c.classList.remove('on');
    if (c.querySelector('.m-cat-label').textContent === label || (label !== 'All' && label !== 'Cards' && label !== 'Banners' && label !== 'Packaging' && label !== 'Stickers' && label !== 'Books' && c.querySelector('.m-cat-label').textContent === 'All'))
      c.classList.add('on');
    if (c.querySelector('.m-cat-label').textContent === label) c.classList.add('on');
  });
  var grid = q(p, 'search-results');
  if (!grid) return;
  if (label === 'All') { grid.innerHTML = allProducts.map(function(prod,i){ return renderGridCard(p,prod,i); }).join(''); }
  else {
    var catMap = { Cards:'Business Cards', Banners:'Signage', Packaging:'Packaging', Stickers:'Stickers', Books:'Marketing' };
    var mapped = catMap[label] || label;
    var filtered = allProducts.map(function(prod,i){return{p:prod,i:i};}).filter(function(item){ return item.p.category===mapped||item.p.category===label; });
    if (!filtered.length) grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px 20px"><div style="font-size:14px;font-weight:700;color:var(--dark);margin-bottom:4px">No ' + label + ' products</div><div style="font-size:12px;color:var(--muted)">Check back soon!</div></div>';
    else grid.innerHTML = filtered.map(function(item){ return renderGridCard(p,item.p,item.i); }).join('');
  }
  if(typeof lucide!=='undefined') lucide.createIcons();
}

function applyPromo(p, btn) {
  btn.style.background = 'var(--ok)'; btn.textContent = 'FIRST20 Applied!'; btn.disabled = true;
  mToast('Code FIRST20 applied! 20% off');
}

// ---- Init ----
document.addEventListener('DOMContentLoaded', function() {
  // Init icons
  function initIcons() {
    if (typeof lucide !== 'undefined') lucide.createIcons();
    else setTimeout(initIcons, 100);
  }
  initIcons();

  // Populate both phones
  ['ios','and'].forEach(function(p) {
    var content = q(p,'content');
    content.innerHTML = genHomeScreen(p) + genSearchScreen(p) + genPdpScreen(p) + genCartScreen(p) + genOrdersScreen(p) + genProfileScreen(p);
  });

  // Load products
  var fallbackProducts = [
    { name: 'Premium Business Cards', category: 'Business Cards', price: 8.5, rating: 4.9, reviewCount: 127, vendorName: 'Farsi Print House', badge: 'Best Seller', thumb: 'https://images.unsplash.com/photo-1611532736597-de2d4265fba3?w=400&q=80', options: { Quantity: ['250','500','1000'], Finish: ['Matte','Gloss','Soft Touch'] }, description: 'Premium 400gsm business cards with full-colour printing and your choice of finish.' },
    { name: 'Roll-Up Banner', category: 'Signage', price: 22.0, rating: 4.7, reviewCount: 84, vendorName: 'Gulf Banner Co.', badge: 'Popular', thumb: 'https://images.unsplash.com/photo-1626785774573-4b799315345d?w=400&q=80', options: { Size: ['85\u00d7200cm','100\u00d7200cm'] }, description: 'Professional roll-up banners with aluminium stand and carry case.' },
    { name: 'Custom Gift Box', category: 'Packaging', price: 4.75, rating: 4.8, reviewCount: 203, vendorName: 'BoxCraft', badge: 'New', thumb: 'https://images.unsplash.com/photo-1607344645866-009c320b63e0?w=400&q=80', options: { Size: ['Small','Medium','Large'] }, description: 'Custom printed gift boxes with magnetic closure.' },
    { name: 'Vinyl Stickers', category: 'Stickers', price: 3.0, rating: 4.6, reviewCount: 156, vendorName: 'KWPrint Express', badge: 'Hot', thumb: 'https://images.unsplash.com/photo-1616628188540-925618b5899e?w=400&q=80', options: { Shape: ['Circle','Square','Die-Cut'] }, description: 'Waterproof vinyl stickers with vibrant colours.' },
    { name: 'Corporate Letterheads', category: 'Stationery', price: 15.0, rating: 4.8, reviewCount: 91, vendorName: 'Farsi Print House', badge: 'Premium', thumb: 'https://images.unsplash.com/photo-1586075010923-2dd4570fb338?w=400&q=80', options: { Paper: ['100gsm','120gsm'] }, description: 'Professional corporate letterheads on premium paper.' },
    { name: 'Tri-Fold Brochure', category: 'Marketing', price: 12.0, rating: 4.7, reviewCount: 78, vendorName: 'City Press', badge: 'Staff Pick', thumb: 'https://images.unsplash.com/photo-1572025442646-866d16c84a54?w=400&q=80', options: { Size: ['A4','DL'] }, description: 'Full-colour tri-fold brochures on 170gsm gloss paper.' }
  ];

  function populateProducts(products) {
    allProducts = products;
    ['ios','and'].forEach(function(p) {
      var home = document.getElementById(p + '-home-products');
      if (home) home.innerHTML = products.slice(0,6).map(function(prod,i){ return renderProductCard(p,prod,i); }).join('');
      var arr = document.getElementById(p + '-new-arrivals');
      if (arr) { var rev = [].concat(products).reverse(); arr.innerHTML = rev.slice(0,6).map(function(prod,i){ return renderProductCard(p,prod,products.length-1-i); }).join(''); }
      var grid = document.getElementById(p + '-search-results');
      if (grid) grid.innerHTML = products.map(function(prod,i){ return renderGridCard(p,prod,i); }).join('');
    });
    if(typeof lucide!=='undefined') lucide.createIcons();
  }

  fetch('data/products.json')
    .then(function(r){ return r.json(); })
    .then(populateProducts)
    .catch(function(){ populateProducts(fallbackProducts); });
});
